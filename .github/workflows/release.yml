name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release-pr:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update release files
        run: npx standard-version --skip.commit --skip.tag

      - name: Read release version
        id: release_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create or update release pull request
        id: create_release_pr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/main
          delete-branch: true
          commit-message: chore(release): ${{ steps.release_version.outputs.version }}
          title: chore(release): ${{ steps.release_version.outputs.version }}
          body: |
            Automated release PR generated by GitHub Actions.

            This PR updates:
            - CHANGELOG.md
            - package.json
            - package-lock.json
          labels: |
            release

      - name: Show pull request result
        run: |
          echo "Operation: ${{ steps.create_release_pr.outputs.pull-request-operation }}"
          echo "PR URL: ${{ steps.create_release_pr.outputs.pull-request-url }}"

  tag-release:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Read release version
        id: release_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          tag_name="v${{ steps.release_version.outputs.version }}"
          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "$tag_name already exists."
            exit 0
          fi

          git tag "$tag_name"
          git push origin "$tag_name"